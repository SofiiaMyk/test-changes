name: Test cosign copy with signatures

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write # required for keyless cosign signing

    env:
      OWNER: ${{ github.repository_owner }}
      IMAGE_NAME: ci-test-image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Build image
        run: docker build -t "${IMAGE_NAME}:latest" .

      # Simulates: build job pushes to Harbor github-actions-artifacts
      - name: Push to staging (simulates Harbor github-actions-artifacts)
        run: |
          OWNER="${OWNER,,}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag "${IMAGE_NAME}:latest" "ghcr.io/${OWNER}/github-actions-artifacts/${IMAGE_NAME}:v1.0.0"
          docker push "ghcr.io/${OWNER}/github-actions-artifacts/${IMAGE_NAME}:v1.0.0"
          echo "STAGING=ghcr.io/${OWNER}/github-actions-artifacts/${IMAGE_NAME}:v1.0.0" >> $GITHUB_ENV

      # Simulates: sign job
      - name: Sign staging image
        run: |
          cosign sign --yes "${STAGING}"
          echo "✅ Signed: ${STAGING}" >> $GITHUB_STEP_SUMMARY

      # Simulates: Copy signatures to Harbor destination step
      - name: cosign copy staging → Harbor ci (simulates Harbor→Harbor with signatures)
        run: |
          OWNER="${OWNER,,}"
          DEST="ghcr.io/${OWNER}/ci/${IMAGE_NAME}:v1.0.0"
          echo "Copying ${STAGING} to ${DEST} ..."
          cosign copy "${STAGING}" "${DEST}"
          echo "HARBOR_DEST=${DEST}" >> $GITHUB_ENV
          echo "✅ Harbor ci copy done: ${DEST}" >> $GITHUB_STEP_SUMMARY

      # Simulates: Publish to GHCR step
      - name: cosign copy staging → GHCR final (simulates Publish to GHCR)
        run: |
          OWNER="${OWNER,,}"
          DEST="ghcr.io/${OWNER}/${IMAGE_NAME}:v1.0.0"
          echo "Copying ${STAGING} to ${DEST} ..."
          cosign copy "${STAGING}" "${DEST}"
          echo "GHCR_DEST=${DEST}" >> $GITHUB_ENV
          echo "✅ GHCR publish done: ${DEST}" >> $GITHUB_STEP_SUMMARY

      - name: Verify signatures on all destinations
        run: |
          VERIFY="cosign verify --certificate-identity-regexp=.* --certificate-oidc-issuer=https://token.actions.githubusercontent.com"

          echo "=== staging (source) ===" && $VERIFY "${STAGING}" && echo "✅ signed" || echo "❌ not signed"
          echo "=== Harbor ci (Harbor→Harbor copy) ===" && $VERIFY "${HARBOR_DEST}" && echo "✅ signed" || echo "❌ not signed"
          echo "=== GHCR final (Publish to GHCR copy) ===" && $VERIFY "${GHCR_DEST}" && echo "✅ signed" || echo "❌ not signed"
