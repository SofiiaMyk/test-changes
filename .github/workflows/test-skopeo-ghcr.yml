name: Test cosign copy with signatures

on:
  workflow_dispatch:
    inputs:
      project-type:
        description: Project type to simulate (e.g. ci or internal)
        required: false
        default: ci
  push:
    branches:
      - main

jobs:
  test-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write # required for keyless cosign signing

    env:
      OWNER: ${{ github.repository_owner }}
      IMAGE_NAME: ci-test-image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Build and push staging image
        run: |
          OWNER="${OWNER,,}"
          docker build -t "${IMAGE_NAME}:staging" .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag "${IMAGE_NAME}:staging" "ghcr.io/${OWNER}/${IMAGE_NAME}:staging"
          docker push "ghcr.io/${OWNER}/${IMAGE_NAME}:staging"
          echo "STAGING_IMAGE=ghcr.io/${OWNER}/${IMAGE_NAME}:staging" >> $GITHUB_ENV

      - name: Sign staging image
        run: |
          cosign sign --yes "${STAGING_IMAGE}"
          echo "Signed: ${STAGING_IMAGE}" >> $GITHUB_STEP_SUMMARY

      - name: "[REPRODUCE ERROR] skopeo copy - signatures will NOT transfer"
        run: |
          OWNER="${OWNER,,}"
          DEST="ghcr.io/${OWNER}/${IMAGE_NAME}:skopeo-copy"
          echo "Copying via skopeo: ${STAGING_IMAGE} → ${DEST}"
          docker run --rm \
            quay.io/skopeo/stable:v1.18.0-immutable@sha256:3e5efe94472b0a1887b3460e55c9d4eaf7ec62b73395c6ac5916b88390377dee \
            copy \
            --all \
            --retry-times 3 \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${STAGING_IMAGE}" \
            "docker://${DEST}"
          echo "skopeo-copy done — check GHCR for missing .sig tag on ${DEST}" >> $GITHUB_STEP_SUMMARY


